# Alice's sandbox — blue/green split-container layout.
#
#   alice-daemon:       signal-cli only, singleton
#   alice-worker-blue:  a worker slot; exactly one of blue/green is live
#   alice-worker-green: the other worker slot
#
# Only ONE of blue/green is running normally. The deploy script alternates
# which slot takes the new image. The live one holds an exclusive flock on
# /state/worker/lease; the other, if alive, blocks on the flock and waits.
#
# On first start, `compose up` brings up alice-worker-blue only (profile
# selection via COMPOSE_PROFILES or `--profile` flag).
#
# Personal sidecars go in docker-compose.override.yml.

x-worker-base: &worker-base
  build:
    context: ..
    dockerfile: sandbox/worker/Dockerfile
    args:
      USER_ID: ${USER_ID:-1000}
      GROUP_ID: ${GROUP_ID:-1000}
  restart: unless-stopped
  depends_on:
    alice-daemon:
      condition: service_healthy
  networks:
    - alice-net
  labels:
    alice.role: worker
  environment:
    SIGNAL_API: "http://alice-daemon:8080"
    SIGNAL_LOG_FILE: "/state/daemon/signal-daemon.log"
    STATE_DIR: "/state/worker"
    TZ: "${ALICE_TZ:-America/New_York}"
    PATH: "/home/alice/alice-tools/bin:/home/alice/.local/bin:/usr/local/bin:/usr/bin:/bin"
    # GitHub PAT for the gh CLI (and git-over-https via gh's credential
    # helper). Sourced from alice.env by bin/_alice-env.sh, so adding
    # GH_TOKEN=ghp_... to alice.env then bouncing the worker is enough
    # to pick it up. Empty (the default) lets gh fall through to the
    # mounted ~/.config/gh OAuth credentials instead — existing host
    # auth setups keep working.
    GH_TOKEN: "${GH_TOKEN:-}"
    # A2A (Google Agent2Agent protocol) — opt-in via alice.env. The
    # speaking daemon spins up a uvicorn server on this port inside the
    # worker container when ALICE_A2A_ENABLED=true. The port is
    # intentionally NOT published to the host by default: blue and green
    # slots share the same x-worker-base, and a static publish would
    # conflict during alice-deploy's swap (both containers briefly run).
    # To expose A2A to the host or wider network, add a docker-compose
    # .override.yml entry that publishes ALICE_A2A_PORT only on the slot
    # you actually want live, or front the workers with an external
    # load balancer that targets the lease-holder.
    ALICE_A2A_ENABLED: "${ALICE_A2A_ENABLED:-}"
    ALICE_A2A_PORT: "${ALICE_A2A_PORT:-}"
    ALICE_A2A_HOST: "${ALICE_A2A_HOST:-}"
    ALICE_A2A_PRINCIPAL: "${ALICE_A2A_PRINCIPAL:-}"
    ALICE_A2A_EXTERNAL_URL: "${ALICE_A2A_EXTERNAL_URL:-}"
  volumes:
    # Mind + tools default to <repo>/data/{alice-mind,alice-tools}; alice-up
    # exports ALICE_MIND / ALICE_TOOLS pointing there. Fall back to the
    # legacy ~/alice-{mind,tools} paths if compose is invoked directly.
    - ${ALICE_MIND:-${HOME}/alice-mind}:/home/alice/alice-mind:rw
    - ${ALICE_TOOLS:-${HOME}/alice-tools}:/home/alice/alice-tools:rw
    # Monorepo bind-mounted rw so Alice can self-improve in place (her
    # subagents can commit + push from inside the container). The host
    # path holds everything that runs her — agent kernel, speaking
    # daemon, thinking wake, viewer — under src/*. Policy: thinking MUST
    # NOT write here (hemisphere boundary); enforcement is documentation.
    # Override ALICE_REPO when this repo lives somewhere other than ~/alice
    # (e.g. ~/dev/alice). alice-up auto-detects from its own location.
    - ${ALICE_REPO:-${HOME}/alice}:/home/alice/alice:rw
    - ${HOME}/.config/gh:/home/alice/.config/gh:ro
    - ${HOME}/.ssh:/home/alice/.ssh:ro
    - ${HOME}/.config/alice:/home/alice/.config/alice:ro
    - ${HOME}/.alice-claude:/home/alice/.claude:rw
    # Host's Claude config — mounted as DIRECTORIES (not individual files)
    # so that atomic file replaces (e.g. /login writing a new credentials
    # file) become visible inside the container. Single-file bind mounts
    # pin the inode at container-create time and go silently stale on
    # token refresh. The entrypoint symlinks .credentials.json and
    # .claude.json into their expected locations.
    - ${HOME}/.claude:/host-claude:ro
    # Host's Codex CLI auth — same directory-not-file rule as Claude
    # above. The entrypoint runs codex-to-pi-auth at container start
    # to translate ~/.codex/auth.json into ~/.pi/agent/auth.json so
    # PiKernel can use the ChatGPT subscription.
    - ${HOME}/.codex:/host-codex:ro
    - ${HOME}:/host-home:ro
    - ${HOME}/.local/state/alice:/state:rw
  working_dir: /home/alice/alice-mind
  command: ["/usr/local/bin/entrypoint.sh", "sleep", "infinity"]

services:
  alice-daemon:
    build:
      context: ..
      dockerfile: sandbox/daemon/Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    image: alice-daemon:latest
    container_name: alice-daemon
    hostname: alice-daemon
    restart: unless-stopped
    networks:
      - alice-net
    environment:
      TZ: "${ALICE_TZ:-America/New_York}"
    volumes:
      - ${HOME}/.config/alice:/home/alice/.config/alice:ro
      - ${HOME}/.local/share/signal-cli:/home/alice/.local/share/signal-cli:rw
      - ${HOME}/.local/state/alice:/state:rw

  alice-worker-blue:
    <<: *worker-base
    image: alice-worker:blue
    container_name: alice-worker-blue
    hostname: alice-worker-blue
    profiles: ["blue"]

  alice-worker-green:
    <<: *worker-base
    image: alice-worker:green
    container_name: alice-worker-green
    hostname: alice-worker-green
    profiles: ["green"]

  alice-viewer:
    build:
      context: ..
      dockerfile: sandbox/viewer/Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    image: alice-viewer:latest
    container_name: alice-viewer
    hostname: alice-viewer
    restart: unless-stopped
    networks:
      - alice-net
    ports:
      - "7777:7777"
    environment:
      ALICE_VIEWER_HOST: "0.0.0.0"
      ALICE_VIEWER_PORT: "7777"
      ALICE_STATE: "/state/worker"
      ALICE_MIND: "/home/alice/alice-mind"
      ALICE_VIEWER_CACHE_DIR: "/state/viewer-cache"
      TZ: "${ALICE_TZ:-America/New_York}"
    volumes:
      - ${ALICE_REPO:-${HOME}/alice}:/home/alice/alice:ro
      - ${ALICE_MIND:-${HOME}/alice-mind}:/home/alice/alice-mind:ro
      - ${HOME}/.local/state/alice:/state:rw
      # alice.env carries CLAUDE_CODE_OAUTH_TOKEN for run_summary's
      # Haiku call; alice_core.auth reads it from this default path.
      - ${HOME}/.config/alice:/home/alice/.config/alice:ro

networks:
  alice-net:
    name: alice-net
    driver: bridge
