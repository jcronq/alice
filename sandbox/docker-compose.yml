# Alice's sandbox — split-container layout for blue/green deploys.
#
#   alice-daemon:       signal-cli only, singleton
#   alice-worker:       bridge + claude + autopush, the live worker
#   alice-worker-next:  used only during a blue/green deploy (profile=deploy)
#
# Both workers share the `worker-base` anchor — identical volumes, env,
# network — but use different image tags. During a deploy, -next is started
# from :candidate, acquires the lease, then replaces the live one.
#
# Personal sidecars go in docker-compose.override.yml.

x-worker-base: &worker-base
  build:
    context: ..
    dockerfile: sandbox/worker/Dockerfile
    args:
      USER_ID: ${USER_ID:-1000}
      GROUP_ID: ${GROUP_ID:-1000}
  restart: unless-stopped
  depends_on:
    alice-daemon:
      condition: service_healthy
  networks:
    - alice-net
  labels:
    alice.role: worker
  environment:
    SIGNAL_API: "http://alice-daemon:8080"
    SIGNAL_LOG_FILE: "/state/daemon/signal-daemon.log"
    STATE_DIR: "/state/worker"
    TZ: "${ALICE_TZ:-America/New_York}"
    PATH: "/home/alice/alice-tools/bin:/home/alice/.local/bin:/usr/local/bin:/usr/bin:/bin"
  volumes:
    - ${HOME}/alice-mind:/home/alice/alice-mind:rw
    - ${HOME}/alice-tools:/home/alice/alice-tools:rw
    - ${HOME}/.config/gh:/home/alice/.config/gh:ro
    - ${HOME}/.ssh:/home/alice/.ssh:ro
    - ${HOME}/.config/alice:/home/alice/.config/alice:ro
    - ${HOME}/.alice-claude:/home/alice/.claude:rw
    - ${HOME}/.claude/.credentials.json:/home/alice/.claude/.credentials.json:ro
    - ${HOME}/.claude.json:/home/alice/.claude.json:ro
    - ${HOME}/.local/state/alice:/state:rw
  working_dir: /home/alice/alice-mind
  command: ["/usr/local/bin/entrypoint.sh", "sleep", "infinity"]

services:
  alice-daemon:
    build:
      context: ..
      dockerfile: sandbox/daemon/Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    image: alice-daemon:latest
    container_name: alice-daemon
    hostname: alice-daemon
    restart: unless-stopped
    networks:
      - alice-net
    environment:
      TZ: "${ALICE_TZ:-America/New_York}"
    volumes:
      - ${HOME}/.config/alice:/home/alice/.config/alice:ro
      - ${HOME}/.local/share/signal-cli:/home/alice/.local/share/signal-cli:rw
      - ${HOME}/.local/state/alice:/state:rw

  alice-worker:
    <<: *worker-base
    image: alice-worker:latest
    container_name: alice-worker
    hostname: alice-worker

  alice-worker-next:
    <<: *worker-base
    image: alice-worker:candidate
    container_name: alice-worker-next
    hostname: alice-worker-next
    profiles: ["deploy"]

networks:
  alice-net:
    name: alice-net
    driver: bridge
