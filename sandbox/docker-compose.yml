# Alice's sandbox — blue/green split-container layout.
#
#   alice-daemon:       signal-cli only, singleton
#   alice-worker-blue:  a worker slot; exactly one of blue/green is live
#   alice-worker-green: the other worker slot
#
# Only ONE of blue/green is running normally. The deploy script alternates
# which slot takes the new image. The live one holds an exclusive flock on
# /state/worker/lease; the other, if alive, blocks on the flock and waits.
#
# On first start, `compose up` brings up alice-worker-blue only (profile
# selection via COMPOSE_PROFILES or `--profile` flag).
#
# Personal sidecars go in docker-compose.override.yml.

x-worker-base: &worker-base
  build:
    context: ..
    dockerfile: sandbox/worker/Dockerfile
    args:
      USER_ID: ${USER_ID:-1000}
      GROUP_ID: ${GROUP_ID:-1000}
  restart: unless-stopped
  depends_on:
    alice-daemon:
      condition: service_healthy
  networks:
    - alice-net
  labels:
    alice.role: worker
  environment:
    SIGNAL_API: "http://alice-daemon:8080"
    SIGNAL_LOG_FILE: "/state/daemon/signal-daemon.log"
    STATE_DIR: "/state/worker"
    TZ: "${ALICE_TZ:-America/New_York}"
    PATH: "/home/alice/alice-tools/bin:/home/alice/.local/bin:/usr/local/bin:/usr/bin:/bin"
  volumes:
    - ${HOME}/alice-mind:/home/alice/alice-mind:rw
    - ${HOME}/alice-tools:/home/alice/alice-tools:rw
    - ${HOME}/.config/gh:/home/alice/.config/gh:ro
    - ${HOME}/.ssh:/home/alice/.ssh:ro
    - ${HOME}/.config/alice:/home/alice/.config/alice:ro
    - ${HOME}/.alice-claude:/home/alice/.claude:rw
    - ${HOME}/.claude/.credentials.json:/home/alice/.claude/.credentials.json:ro
    - ${HOME}/.claude.json:/home/alice/.claude.json:ro
    - ${HOME}/.local/state/alice:/state:rw
  working_dir: /home/alice/alice-mind
  command: ["/usr/local/bin/entrypoint.sh", "sleep", "infinity"]

services:
  alice-daemon:
    build:
      context: ..
      dockerfile: sandbox/daemon/Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    image: alice-daemon:latest
    container_name: alice-daemon
    hostname: alice-daemon
    restart: unless-stopped
    networks:
      - alice-net
    environment:
      TZ: "${ALICE_TZ:-America/New_York}"
    volumes:
      - ${HOME}/.config/alice:/home/alice/.config/alice:ro
      - ${HOME}/.local/share/signal-cli:/home/alice/.local/share/signal-cli:rw
      - ${HOME}/.local/state/alice:/state:rw

  alice-worker-blue:
    <<: *worker-base
    image: alice-worker:blue
    container_name: alice-worker-blue
    hostname: alice-worker-blue
    profiles: ["blue"]

  alice-worker-green:
    <<: *worker-base
    image: alice-worker:green
    container_name: alice-worker-green
    hostname: alice-worker-green
    profiles: ["green"]

networks:
  alice-net:
    name: alice-net
    driver: bridge
